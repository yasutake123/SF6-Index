<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>SF6 Move Index</h1>
    <p>ALEXの技一覧</p>
    <input type="text" id="keyword" placeholder="技名を入力">
    <table id="moveTable" border="1">
        <thead>
            <tr>
                <th>技名</th>
                <th>コマンド</th>
                <th>発生</th>
                <th>持続</th>
                <th>全体</th>
            </tr>
        </thead>
        <tbody id="moveTableBody">
            <!-- 技データがここに挿入される -->
            <tr th:each="move : ${moves}">
                <td th:text="${move.name}"></td>
                <td th:text="${move.input}"></td>
                <td th:text="${move.motionFrame.startup}"></td>
                <td th:text="${move.motionFrame.active}"></td>
                <td th:text="${move.motionFrame.total}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
